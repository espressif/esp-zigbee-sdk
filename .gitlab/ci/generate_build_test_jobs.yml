.rules_generate_build_test:
  rules:
    - when: on_success

generate_child_pipeline:
  extends:
    - .rules_generate_build_test
  stage: pre_build
  image: ${CI_DOCKER_REGISTRY}/esp-env-${DOCKER_ENV_FOR_GENERATE}
  artifacts:
    paths:
      - child_pipeline_default.yml
      - child_pipeline_lts.yml
    expire_in: 3 days
    when: always
  tags:
    - build
  script:
    - |
      python3 tools/ci/dynamic_pipelines/generate_child_pipeline.py \
        --result child_pipeline_default.yml \
        --idf_version ${CI_IDF_DEFAULT} \
        --chips esp32h2 esp32s3 esp32c6 esp32c5 \
        --build_templates build_non_pytest_example build_pytest_sdk_example build_pytest_gateway_sdk_example \
        --test_templates pytest_sdk_example
    - |
      python3 tools/ci/dynamic_pipelines/generate_child_pipeline.py \
        --result child_pipeline_lts.yml \
        --idf_version ${CI_IDF_LTS} \
        --chips esp32h2 esp32s3 esp32c6 \
        --build_templates build_non_pytest_example build_pytest_sdk_example build_pytest_gateway_sdk_example \
        --test_templates pytest_sdk_example

build_and_test_pipeline_default:
  extends:
    - .rules_generate_build_test
  stage: build
  needs:
    - generate_child_pipeline
  inherit:
    variables: true
  trigger:
    include:
      - artifact: child_pipeline_default.yml
        job: generate_child_pipeline
    forward:
      pipeline_variables: true
    strategy: depend

build_and_test_pipeline_lts:
  extends:
    - .rules_generate_build_test
  stage: build
  needs:
    - generate_child_pipeline
  inherit:
    variables: true
  trigger:
    include:
      - artifact: child_pipeline_lts.yml
        job: generate_child_pipeline
    forward:
      pipeline_variables: true
    strategy: depend

