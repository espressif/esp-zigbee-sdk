include:
  - '.gitlab/ci/common.yml'

.common_before_scripts: &common_before_scripts
  - source tools/ci/ci_utils.sh
  - setup_idf
  - if [ -n "${UPSTREAM_JOB_ID}" ]; then prepare_esp_zigbee_lib; fi
  - pip install -r tools/ci/requirements-build.txt
  - update_lib_path

.build_example_template:
  stage: build
  before_script:
    - *common_before_scripts
  image: ${CI_DOCKER_REGISTRY}/esp-env-${DOCKER_ENV_VERSION}
  artifacts:
    paths:
      - "**/build*/*.bin"
      - "**/build*/*.map"
      - "**/build*/*.elf"
      - "**/build*/flasher_args.json"
      - "**/build*/flash_project_args"
      - "**/build*/config/sdkconfig.json"
      - "**/build*/bootloader/*.bin"
      - "**/build*/partition_table/*.bin"
    when: always
    expire_in: 4 days
  tags:
    - build

.build_non_pytest_example:
  extends:
    - .build_example_template
  script:
    - python tools/ci/build_apps.py ./examples --no_pytest --ignore_warning

.build_pytest_sdk_example:
  extends:
    - .build_example_template
  parallel: 4
  script:
    - update_gateway_wifi_config ${CI_PROJECT_DIR}/examples/zigbee_gateway
    - python tools/ci/build_apps.py ./examples --pytest --ignore_warning
      --parallel-count ${CI_NODE_TOTAL:-1}
      --parallel-index ${CI_NODE_INDEX:-1}

.build_pytest_gateway_sdk_example:
  extends:
    - .build_example_template
  script:
    # build rcp gateway for esp32s3
    - build_ot_rcp esp32h2
    - python tools/ci/build_apps.py ./examples --target esp32s3 --example zigbee_gateway --ignore_warning
    - mv ${CI_PROJECT_DIR}/esp-idf/examples/openthread/ot_rcp/build ${CI_PROJECT_DIR}/esp-idf/examples/openthread/ot_rcp/build_esp32h2_default
    # build rcp gateway for esp32p4
    - |
      if [[ "${IDF_VERSION}" == "master" || "${IDF_VERSION}" > "v5.3" ]]; then
        build_ot_rcp esp32c6
        python tools/ci/build_apps.py ./examples --target esp32p4 --example zigbee_gateway --ignore_warning
        mv ${CI_PROJECT_DIR}/esp-idf/examples/openthread/ot_rcp/build ${CI_PROJECT_DIR}/esp-idf/examples/openthread/ot_rcp/build_esp32c6_default
      fi
    - build_example ${CI_PROJECT_DIR}/examples/all_device_types_app esp32h2

.pytest_template_base:
  stage: target_test
  image: ${CI_DOCKER_REGISTRY}/target-test-env-${DOCKER_ENV_VERSION}
  artifacts:
    paths:
      - "pytest_embedded_log/"
    when: always
    expire_in: 4 days
  tags:
    - ${CHIP}
    - zigbee_ci_test

.pytest_sdk_example:
  extends:
    - .pytest_template_base
  script:
    - pip install -r tools/ci/requirements-pytest.txt
    # prepare rcp for gateway
    - |
      if [ "${CHIP}" == "esp32s3" ]; then
          mv ${CI_PROJECT_DIR}/esp-idf/examples/openthread/ot_rcp/build_esp32h2_default ${CI_PROJECT_DIR}/esp-idf/examples/openthread/ot_rcp/build
      elif [ "${CHIP}" == "esp32p4" ]; then
          mv ${CI_PROJECT_DIR}/esp-idf/examples/openthread/ot_rcp/build_esp32c6_default ${CI_PROJECT_DIR}/esp-idf/examples/openthread/ot_rcp/build
      fi
    - find examples/ -name "pytest_*.py" | xargs pytest --target ${CHIP}

