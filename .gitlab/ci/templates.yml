include:
  - '.gitlab/ci/common.yml'

.common_before_scripts: &common_before_scripts
  - source tools/ci/ci_utils.sh
  - setup_idf
  - setup_esp_zigbee_sdk
  - pip install -r tools/ci/requirements-build.txt
  - update_lib_path

.build_example_template:
  stage: build
  before_script:
    - *common_before_scripts
  image: ${CI_DOCKER_REGISTRY}/esp-env-${DOCKER_ENV_VERSION}
  artifacts:
    paths:
      - "**/build*/*.bin"
      - "**/build*/*.map"
      - "**/build*/*.elf"
      - "**/build*/flasher_args.json"
      - "**/build*/flash_project_args"
      - "**/build*/config/sdkconfig.json"
      - "**/build*/bootloader/*.bin"
      - "**/build*/partition_table/*.bin"
    when: always
    expire_in: 4 days
  tags:
    - build

.build_non_pytest_example:
  extends:
    - .build_example_template
  script:
    - python tools/ci/build_apps.py ./examples --no_pytest --ignore_warning

.build_pytest_sdk_example:
  extends:
    - .build_example_template
  parallel: 4
  script:
    - update_gateway_wifi_config ${CI_PROJECT_DIR}/examples/zigbee_gateway
    - python tools/ci/build_apps.py ./examples --pytest --ignore_warning

.build_pytest_gateway_sdk_example:
  extends:
    - .build_example_template
  script:
    - build_example ${CI_PROJECT_DIR}/examples/all_device_types_app esp32h2
    # true means enable rcp update
    - build_rcp_gateway ${CI_PROJECT_DIR}/examples/zigbee_gateway true

.pytest_template_base:
  stage: target_test
  image: ${CI_DOCKER_REGISTRY}/target-test-env-${DOCKER_ENV_VERSION}
  artifacts:
    paths:
      - "pytest_embedded_log/"
    when: always
    expire_in: 4 days
  tags:
    - ${CHIP}
    - zigbee_multi_dut

.pytest_sdk_example:
  extends:
    - .pytest_template_base
  script:
    - pip install -r tools/ci/requirements-pytest.txt
    - find examples/ -name "pytest_*.py" | xargs pytest --target ${CHIP} -m zigbee_multi_dut

